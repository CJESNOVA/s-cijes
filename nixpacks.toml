[providers]
# On force l'utilisation des providers PHP et Node
php = {}
node = {}

[variables]
# Indique à PHP de ne pas chercher d'extensions complexes vides qui font planter le build
PHP_EXTENSIONS = ""

[phases.setup]
# On s'assure d'utiliser des versions stables de Node et PHP
nixPkgs = ["php", "nodejs_20", "nginx", "phpPackages.composer"]