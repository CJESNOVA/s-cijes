# On désactive la détection automatique qui crée les conflits
providers = []

[variables]
PHP_EXTENSIONS = ""
NIXPACKS_NODE_VERSION = "20"

[phases.setup]
# On force l'installation de TOUT l'environnement dans une seule et unique passe Nix
nixPkgs = ["php", "nodejs_20", "nginx", "phpPackages.composer"]